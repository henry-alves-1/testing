name: Get Changed Files

on:
  push:
    branches:
      - '**'

jobs:
  changed-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: changes
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          # ---------------------------------------------------------------
          # CASE 1 – First push on a brand-new branch (no previous commit)
          # ---------------------------------------------------------------
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "New branch — listing all tracked files"
            CHANGED=$(git ls-files)

          # ---------------------------------------------------------------
          # CASE 2 – Merge commit (two parents)
          #   Detected by checking if a second parent (^2) exists.
          #   We diff the two parents against each other to get every file
          #   touched by the incoming branch, not just the merge commit delta.
          # ---------------------------------------------------------------
          elif git rev-parse --verify "${AFTER}^2" > /dev/null 2>&1; then
            PARENT_1=$(git rev-parse "${AFTER}^1")
            PARENT_2=$(git rev-parse "${AFTER}^2")
            echo "Merge commit detected — diffing parent1 (${PARENT_1}) vs parent2 (${PARENT_2})"
            CHANGED=$(git diff --name-only "${PARENT_1}...${PARENT_2}")

          # ---------------------------------------------------------------
          # CASE 3 – Regular push: diff previous commit against current HEAD
          # ---------------------------------------------------------------
          else
            echo "Regular push — diffing ${BEFORE} → ${AFTER}"
            CHANGED=$(git diff --name-only "${BEFORE}" "${AFTER}")
          fi

          # ---------------------------------------------------------------
          # Persist & display results
          # ---------------------------------------------------------------
          if [ -z "$CHANGED" ]; then
            echo "No changed files detected."
            echo "changed_files=" >> "$GITHUB_OUTPUT"
          else
            echo "Changed files:"
            echo "$CHANGED"

            {
              echo "changed_files<<EOF"
              echo "$CHANGED"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"

            echo "$CHANGED" > changed_files.txt
          fi

      # ---------------------------------------------------------------
      # Example: use the list in a downstream step
      # ---------------------------------------------------------------
      - name: Use changed files
        if: steps.changes.outputs.changed_files != ''
        run: |
          while IFS= read -r file; do
            echo "Processing: $file"
            # Add your per-file logic here
          done <<< "${{ steps.changes.outputs.changed_files }}"
